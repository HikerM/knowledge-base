storage_policy:
  default_model_dir_windows: "%LOCALAPPDATA%\\PersonalKnowledgeBase\\models\\"
  user_custom_model_dir_allowed: true
  user_custom_dir_requires_future_confirmation: true
  forbidden_locations:
    - "workspace"
    - "software_install_dir"
    - "knowledge"
    - ".kb"
    - "config"
    - "templates"
    - "reports"
    - "system_dir"
  uninstall_app_deletes_models_by_default: false
  user_can_delete_model_files_in_settings: true
  delete_model_requires_confirmation: true

download_policy:
  stage: "design_only"
  source_kind: "modelscope"
  no_auto_download: true
  actual_download_enabled: false
  confirmation_required: true
  single_file_gguf_only: true
  no_repository_download: true
  whole_repository_download_allowed: false
  arbitrary_url_download_allowed: false
  no_shell_script: true
  shell_download_script_allowed: false
  no_arbitrary_command: true
  user_confirmation_required: true
  task_queue_required: true
  no_30gb_default: true
  max_default_download_size_gb: 2.0
  reject_default_if_download_size_gb_gte: 30.0

verification_policy:
  sha256_required_for_verified_install: true
  sha256_pending_blocks_verified_install: true
  expected_size_required: true
  invalid_checksum_fails_install: true
  license_review_required: true

privacy_policy:
  local_mode_data_leaves_device_by_default: false
  cloud_mode_enabled: false
  context_policy_required: true
  direct_markdown_access_allowed: false
  direct_sqlite_access_allowed: false
  capability_registry_required: true
  permission_policy_required: true
  provider_can_execute_mutation: false
  provider_can_execute_shell: false
